spring:
  application:
    name: ms-operaciones
  datasource:
    url: ${DB_URL:jdbc:h2:mem:ms_operaciones;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: org.h2.Driver
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ms_operaciones}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# Configuración de correo
spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Configuración del servidor
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# Configuración de microservicios externos
ms-puerto:
  url: ${MS_PUERTO_URL:http://localhost:8081}

ms-buque:
  url: ${MS_BUQUE_URL:http://localhost:8082}

ms-user:
  url: ${MS_USER_URL:http://localhost:8083}

# Configuración de CORS
spring:
  web:
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://54.88.10.118:3000}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
